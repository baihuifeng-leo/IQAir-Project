<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>登录 · 电商工作台</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230a0e17'/><path d='M6 20h7M6 14h13M6 26h4' stroke='%234ee0c1' stroke-width='2.6' stroke-linecap='round'/><circle cx='24' cy='11' r='3' fill='%235b8cff'/></svg>">
<link rel="stylesheet" href="/styles.css">
<style>
  /* 全局样式表把 html/body 锁成 overflow:hidden（内页需要），登录页要放开 */
  html { height: auto; min-height: 100%; overflow-y: auto; }
  body {
    overflow: visible; position: relative;
    height: auto; min-height: 100vh; min-height: 100dvh;
    display: grid; place-items: center; padding: 48px 20px;
    background:
      radial-gradient(1100px 640px at 78% -12%, #6b98ff14, transparent 62%),
      radial-gradient(900px 560px at 6% 108%, #4ee0c111, transparent 60%),
      var(--bg);
  }

  /* ── 背景：极光色团 + 细网格 ─────────────────────────── */
  .bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .aurora { position: absolute; border-radius: 50%; filter: blur(70px); will-change: transform; }
  .aurora.a1 { width: 560px; height: 560px; left: -6%; top: -18%; background: radial-gradient(circle, #4ee0c13d, transparent 68%); animation: drift1 26s ease-in-out infinite; }
  .aurora.a2 { width: 680px; height: 680px; right: -8%; top: 24%; background: radial-gradient(circle, #6b98ff33, transparent 68%); filter: blur(95px); animation: drift2 32s ease-in-out infinite; }
  .aurora.a3 { width: 420px; height: 420px; left: 34%; bottom: -20%; background: radial-gradient(circle, #4ee0c126, transparent 68%); animation: drift1 22s ease-in-out -8s infinite reverse; }
  @keyframes drift1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(44px,28px) scale(1.07); } }
  @keyframes drift2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-52px,22px) scale(0.94); } }

  .grid-lines {
    position: absolute; inset: 0; opacity: 0.5;
    background:
      linear-gradient(90deg, #8494ae0a 1px, transparent 1px),
      linear-gradient(180deg, #8494ae0a 1px, transparent 1px);
    background-size: 44px 44px;
    -webkit-mask-image: radial-gradient(720px 560px at 50% 42%, #000 0%, transparent 78%);
    mask-image: radial-gradient(720px 560px at 50% 42%, #000 0%, transparent 78%);
  }
  .bg-glow {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: radial-gradient(480px 480px at var(--mx, 50%) var(--my, 40%), #4ee0c110, transparent 62%);
  }

  /* ── 舞台：左品牌 / 右卡片,窄屏纵向堆叠 ─────────────── */
  .stage {
    position: relative; z-index: 2;
    display: grid; grid-template-columns: minmax(0, 460px) minmax(0, 400px);
    gap: clamp(36px, 6vw, 96px); align-items: center;
    width: 100%; max-width: 1020px;
  }

  .intro { animation: rise 0.6s var(--ease) both; }
  .intro .brandmark { margin-bottom: 26px; }
  .intro .brandmark .mark { width: 32px; height: 27px; }
  .intro h1 {
    margin: 0; font-family: var(--f-display); font-weight: 700; line-height: 1.08;
    font-size: clamp(34px, 4.6vw, 52px); letter-spacing: 1px;
    background: linear-gradient(120deg, #f2fffc, #4ee0c1 52%, #6b98ff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 26px #4ee0c12e);
  }
  .intro h1 span { display: block; }
  .intro .tagline { margin: 16px 0 0; color: var(--dim); font-size: 14.5px; line-height: 1.8; max-width: 40ch; }

  .feats { margin: 30px 0 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 13px; }
  .feats li { display: flex; align-items: center; gap: 11px; color: var(--dim); font-size: 13.5px; }
  .feats svg { flex: 0 0 30px; width: 30px; height: 30px; padding: 6px; border-radius: 9px; background: #ffffff08; border: 1px solid var(--line-soft); }
  .feats b { color: var(--text); font-weight: 600; margin-right: 6px; }

  /* ── 登录卡片 ────────────────────────────────────────── */
  .gate {
    position: relative; width: 100%;
    background: linear-gradient(180deg, #0f1728e6, #0a111fe6);
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--line); border-radius: 20px;
    padding: 32px 30px 26px;
    box-shadow: 0 40px 90px -32px #000, inset 0 1px 0 #ffffff0d;
    animation: rise 0.6s var(--ease) 0.08s both;
  }
  /* 顶缘一道渐变高光,取代大面积发光 */
  .gate::before {
    content: ""; position: absolute; top: -1px; left: 24px; right: 24px; height: 1px;
    background: linear-gradient(90deg, transparent, #4ee0c1aa, #6b98ffaa, transparent);
  }
  .gate h2 { margin: 0 0 6px; font-family: var(--f-display); font-size: 20px; letter-spacing: 0.5px; }
  .gate .sub { color: var(--dimmer); font-size: 12.5px; margin: 0 0 24px; line-height: 1.7; }

  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase;
    color: var(--dim); margin-bottom: 7px; font-weight: 700;
  }
  .field .inwrap { position: relative; }
  .field .inwrap svg {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; color: var(--dimmer); pointer-events: none;
    transition: color var(--fast);
  }
  .field input {
    width: 100%; background: var(--well); border: 1px solid var(--line); color: var(--text);
    padding: 12px 12px 12px 36px; border-radius: 10px;
    transition: border-color var(--fast), box-shadow var(--fast);
  }
  .field input:focus { outline: none; border-color: var(--mint); box-shadow: 0 0 0 3px var(--mint-dim); }
  .field .inwrap:focus-within svg { color: var(--mint); }
  #p { font-family: var(--f-mono); letter-spacing: 9px; font-size: 17px; }
  #p::placeholder { letter-spacing: 6px; color: var(--dimmer); }

  .gate .solid {
    margin-top: 20px; padding: 12px; font-size: 15px; border-radius: 10px;
    transition: transform 0.24s var(--ease), box-shadow 0.24s var(--ease), filter 0.24s var(--ease);
  }
  .gate .solid:hover { transform: translateY(-1px); box-shadow: 0 10px 26px -8px #17b79c; filter: brightness(1.1); }
  .gate .solid:active { transform: none; }
  .gate .solid:disabled { transform: none; filter: none; cursor: wait; opacity: 0.85; }

  .err {
    margin: 14px 0 0; padding: 10px 12px; border-radius: 9px; font-size: 12.5px;
    background: #2a121480; color: #ff9a9a; border: 1px solid #ff616133; border-left: 3px solid #ff6161;
    animation: shake 0.32s var(--ease);
  }
  @keyframes shake { 25% { transform: translateX(-5px); } 60% { transform: translateX(4px); } 100% { transform: none; } }

  .foot {
    margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--line-soft);
    font-size: 11.5px; color: var(--dimmer); line-height: 1.8;
  }

  @media (max-width: 900px) {
    .stage { grid-template-columns: minmax(0, 420px); justify-content: center; gap: 34px; }
    .intro { text-align: center; }
    .intro .brandmark { justify-content: center; }
    .intro .tagline { margin-inline: auto; }
    .feats { display: none; } /* 手机上直奔登录,少滚一屏 */
  }

  @media (prefers-reduced-motion: reduce) {
    .aurora { animation: none; }
  }
</style>
</head>
<body>
<div class="bg" aria-hidden="true">
  <div class="aurora a1"></div>
  <div class="aurora a2"></div>
  <div class="aurora a3"></div>
  <div class="grid-lines"></div>
</div>
<div class="bg-glow" id="bg-glow" aria-hidden="true"></div>

<main class="stage">
  <section class="intro">
    <div class="brandmark">
      <div class="mark" aria-hidden="true"><span></span><span></span><span></span></div>
      <div class="brandtext">
        <strong>电商工作台</strong>
        <em>E-commerce Workbench</em>
      </div>
    </div>
    <h1><span>IQAir</span><span>电商管理系统</span></h1>
    <p class="tagline">团队共用的竞品价格带沙盘、参数对位与口碑拆解。多人实时协同,改动自动合并、全程留痕。</p>
    <ul class="feats">
      <li>
        <svg viewBox="0 0 24 24" fill="none" stroke="#4ee0c1" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M4 19V5M4 19h16M8 15v-4M12 15V8M16 15v-6"/></svg>
        <span><b>价格带沙盘</b>品牌 × 价格带的产品布局,一眼看清空位</span>
      </li>
      <li>
        <svg viewBox="0 0 24 24" fill="none" stroke="#6b98ff" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M9 3H4v18h5M15 3h5v18h-5M9 12h6"/></svg>
        <span><b>竞品对位</b>参数逐项对齐,优劣势高亮标注</span>
      </li>
      <li>
        <svg viewBox="0 0 24 24" fill="none" stroke="#4ee0c1" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.2 2.2M16.2 16.2l2.2 2.2M18.4 5.6l-2.2 2.2M7.8 16.2l-2.2 2.2"/><circle cx="12" cy="12" r="3.2"/></svg>
        <span><b>评论风向标</b>竞品差评关键词自动拆解溯源</span>
      </li>
    </ul>
  </section>

  <section class="gate" aria-label="登录">
    <h2>登录</h2>
    <p class="sub">用你的用户名和 6 位 PIN 进入工作台。</p>

    <div class="field">
      <label for="u">用户名</label>
      <div class="inwrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c1.6-3.2 4.6-5 8-5s6.4 1.8 8 5"/></svg>
        <input id="u" type="text" autocomplete="username" autofocus spellcheck="false">
      </div>
    </div>
    <div class="field">
      <label for="p">PIN · 6 位数字</label>
      <div class="inwrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><rect x="4" y="10" width="16" height="10" rx="2.5"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
        <input id="p" type="password" inputmode="numeric" autocomplete="current-password" maxlength="6" placeholder="······">
      </div>
    </div>

    <button class="solid" id="go">进入工作台</button>
    <div id="err" role="alert" hidden></div>

    <p class="foot">登录后这台设备 30 天免登录。忘了 PIN 就找管理员重置。</p>
  </section>
</main>

<script>
  const $ = (s) => document.querySelector(s);
  const errBox = $('#err');

  function fail(msg) {
    errBox.hidden = false;
    errBox.className = 'err';
    errBox.textContent = msg;
    errBox.style.animation = 'none';
    void errBox.offsetWidth;
    errBox.style.animation = '';
  }

  const pinBox = $('#p');
  pinBox.addEventListener('input', () => { pinBox.value = pinBox.value.replace(/\D/g, '').slice(0, 6); });

  async function submit() {
    const name = $('#u').value.trim();
    const pin = pinBox.value;
    if (!name) return fail('先填用户名。');
    if (!/^\d{6}$/.test(pin)) return fail('PIN 是 6 位数字。');

    const btn = $('#go');
    btn.disabled = true;
    btn.textContent = '核对中…';
    try {
      const r = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, pin })
      });
      if (r.ok) {
        btn.textContent = '欢迎回来';
        location.replace('/');
        return;
      }
      const j = await r.json().catch(() => ({}));
      fail(j.error || '登录没通过。');
    } catch {
      fail('连不上服务。到服务器上看一眼：systemctl status workbench');
    }
    btn.disabled = false;
    btn.textContent = '进入工作台';
    pinBox.select();
  }

  $('#go').onclick = submit;
  document.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });

  // ── 光标跟随光晕（触屏/降级动画时自动没有 pointermove,天然关闭）──
  const glow = $('#bg-glow');
  window.addEventListener('pointermove', (e) => {
    glow.style.setProperty('--mx', e.clientX + 'px');
    glow.style.setProperty('--my', e.clientY + 'px');
  });
</script>
</body>
</html>

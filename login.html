<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>登录 · 电商工作台</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230a0e17'/><path d='M6 20h7M6 14h13M6 26h4' stroke='%234ee0c1' stroke-width='2.6' stroke-linecap='round'/><circle cx='24' cy='11' r='3' fill='%235b8cff'/></svg>">
<link rel="stylesheet" href="/styles.css">
<style>
  /* 全局样式表把 html/body 锁成 overflow:hidden（内页需要），登录页要放开 */
  html { height: auto; min-height: 100%; overflow-y: auto; }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 40px; overflow: visible; position: relative;
    height: auto; min-height: 100vh; padding: 60px 20px;
    background: var(--bg);
  }

  .bg-orbs { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
  .orb {
    position: absolute; border-radius: 50%; filter: blur(60px);
    will-change: transform;
  }
  .orb1 { width: 520px; height: 520px; left: 8%; top: -10%; background: radial-gradient(circle, #4ee0c14a, transparent 70%); animation: orbfloat1 22s ease-in-out infinite; }
  .orb2 { width: 620px; height: 620px; right: 4%; top: 18%; background: radial-gradient(circle, #5b8cff3d, transparent 70%); filter: blur(90px); animation: orbfloat2 26s ease-in-out infinite; }
  .orb3 { width: 380px; height: 380px; left: 38%; bottom: -14%; background: radial-gradient(circle, #4ee0c130, transparent 70%); filter: blur(50px); animation: orbfloat3 19s ease-in-out infinite; }
  @keyframes orbfloat1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(40px,30px) scale(1.08); } }
  @keyframes orbfloat2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-50px,20px) scale(0.94); } }
  @keyframes orbfloat3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(30px,-25px) scale(1.1); } }

  #bg-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; }
  .bg-glow {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background:
      radial-gradient(520px 520px at var(--mx, 50%) var(--my, 40%), #4ee0c114, transparent 60%);
    transition: background 0.25s ease-out;
  }
  .bg-scan {
    position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 0.4;
    background: repeating-linear-gradient(180deg, transparent 0, transparent 2px, #4ee0c105 3px, transparent 4px);
  }

  .hero { position: relative; z-index: 3; text-align: center; animation: rise 0.6s var(--ease) both; }
  .hero .en {
    font-family: var(--f-display); font-weight: 700; font-size: clamp(40px, 7vw, 68px);
    letter-spacing: 3px; margin: 0; line-height: 1;
    background: linear-gradient(135deg, #eafffb, #4ee0c1 55%, #5b8cff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 24px #4ee0c13d);
  }
  .hero .cn {
    margin: 10px 0 0; font-family: var(--f-body); font-weight: 700;
    font-size: clamp(20px, 3vw, 30px); letter-spacing: 4px; color: var(--text);
    text-shadow: 0 0 30px #4ee0c126;
  }
  .hero .tag {
    margin: 14px 0 0; font-size: 11.5px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--dimmer);
  }

  .gate-wrap { position: relative; z-index: 3; perspective: 1000px; }
  .gate {
    width: min(370px, calc(100vw - 40px));
    background: linear-gradient(180deg, var(--surface), var(--surface-2));
    border: 1px solid var(--line); border-radius: 18px;
    padding: 34px 30px 28px;
    box-shadow: 0 40px 90px -30px #000, 0 0 0 1px #4ee0c10f, 0 0 60px -20px #4ee0c11a;
    animation: rise 0.5s var(--ease) both;
    transform: rotateX(0deg) rotateY(0deg);
    transition: transform 0.35s var(--ease), box-shadow 0.35s var(--ease);
    transform-style: preserve-3d;
    will-change: transform;
  }
  .gate .brandmark { justify-content: flex-start; margin-bottom: 26px; }
  .gate h1 { font-family: var(--f-display); font-size: 19px; letter-spacing: 0.5px; margin: 0 0 6px; }
  .gate .sub { color: var(--dimmer); font-size: 12px; margin: 0 0 24px; line-height: 1.6; }
  .field { margin-bottom: 13px; }
  .field label { display: block; font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; font-weight: 700; }
  .field input {
    width: 100%; background: #060a12; border: 1px solid var(--line); color: var(--text);
    padding: 11px 12px; border-radius: 9px; transition: border-color var(--fast), box-shadow var(--fast);
  }
  .field input:focus { outline: none; border-color: var(--mint); box-shadow: 0 0 0 3px var(--mint-dim); }
  #p { font-family: var(--f-mono); letter-spacing: 8px; font-size: 17px; }
  #p::placeholder { letter-spacing: 6px; color: var(--dimmer); }
  .gate .solid {
    margin-top: 18px; padding: 12px; position: relative; overflow: hidden;
    transition: transform 0.28s var(--ease), box-shadow 0.28s var(--ease), filter 0.28s var(--ease);
  }
  .gate .solid::before {
    content: ""; position: absolute; inset: -2px; border-radius: 10px; z-index: -1;
    background: linear-gradient(135deg, #4ee0c1, #5b8cff, #4ee0c1);
    opacity: 0; filter: blur(10px); transition: opacity 0.28s var(--ease);
  }
  .gate .solid:hover {
    transform: translateY(-2px) scale(1.025);
    box-shadow: 0 10px 26px -8px #17b79c, 0 0 26px -4px #4ee0c1aa;
    filter: brightness(1.12);
  }
  .gate .solid:hover::before { opacity: 0.55; }
  .gate .solid:active { transform: translateY(0) scale(0.99); }
  .gate .solid:disabled { transform: none; filter: none; box-shadow: 0 6px 18px -8px #17b79c; cursor: wait; }
  .gate .solid:disabled::before { opacity: 0; }
  .err {
    margin: 14px 0 0; padding: 9px 12px; border-radius: 8px; font-size: 12.5px;
    background: #2a1214; color: #ff9a9a; border-left: 3px solid #ff6161;
    animation: shake 0.32s var(--ease);
  }
  @keyframes shake { 25% { transform: translateX(-5px); } 60% { transform: translateX(4px); } 100% { transform: none; } }
  .foot { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--line-soft); font-size: 11px; color: var(--dimmer); line-height: 1.7; }

  @media (prefers-reduced-motion: reduce) {
    .orb { animation: none; }
    .gate { transition: none; }
    .bg-glow { transition: none; }
  }
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<canvas id="bg-canvas"></canvas>
<div class="bg-scan"></div>
<div class="bg-glow" id="bg-glow"></div>

<div class="hero">
  <h2 class="en">IQAir</h2>
  <p class="cn">电商管理系统</p>
  <p class="tag">E-Commerce Management System</p>
</div>

<div class="gate-wrap">
<div class="gate">
  <div class="brandmark">
    <div class="mark" aria-hidden="true"><span></span><span></span><span></span></div>
    <div class="brandtext">
      <strong>电商工作台</strong>
      <em>E-commerce Workbench</em>
    </div>
  </div>

  <h1>登录</h1>
  <p class="sub">团队共用的竞品价格带与对位分析。用你的用户名和 6 位 PIN 进来。</p>

  <div class="field">
    <label for="u">用户名</label>
    <input id="u" type="text" autocomplete="username" autofocus spellcheck="false">
  </div>
  <div class="field">
    <label for="p">PIN · 6 位数字</label>
    <input id="p" type="password" inputmode="numeric" autocomplete="current-password" maxlength="6" placeholder="······">
  </div>

  <button class="solid" id="go">进入作战台</button>
  <div id="err" hidden></div>

  <p class="foot">登录后这台设备 30 天免登录。忘了 PIN 就找管理员重置。</p>
</div>
</div>

<script>
  const $ = (s) => document.querySelector(s);
  const errBox = $('#err');

  function fail(msg) {
    errBox.hidden = false;
    errBox.className = 'err';
    errBox.textContent = msg;
    errBox.style.animation = 'none';
    void errBox.offsetWidth;
    errBox.style.animation = '';
  }

  const pinBox = $('#p');
  pinBox.addEventListener('input', () => { pinBox.value = pinBox.value.replace(/\D/g, '').slice(0, 6); });

  async function submit() {
    const name = $('#u').value.trim();
    const pin = pinBox.value;
    if (!name) return fail('先填用户名。');
    if (!/^\d{6}$/.test(pin)) return fail('PIN 是 6 位数字。');

    const btn = $('#go');
    btn.disabled = true;
    btn.textContent = '核对中…';
    try {
      const r = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, pin })
      });
      if (r.ok) {
        btn.textContent = '欢迎回来';
        location.replace('/');
        return;
      }
      const j = await r.json().catch(() => ({}));
      fail(j.error || '登录没通过。');
    } catch {
      fail('连不上服务。到服务器上看一眼：systemctl status workbench');
    }
    btn.disabled = false;
    btn.textContent = '进入作战台';
    pinBox.select();
  }

  $('#go').onclick = submit;
  document.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });

  // ── 光标跟随光晕 ──
  const glow = $('#bg-glow');
  window.addEventListener('pointermove', (e) => {
    glow.style.setProperty('--mx', e.clientX + 'px');
    glow.style.setProperty('--my', e.clientY + 'px');
  });

  // ── 登录卡片 3D 倾斜微交互 ──
  (function () {
    if (!window.matchMedia('(pointer: fine)').matches) return; // 触屏不做倾斜
    const wrap = $('.gate-wrap');
    const card = $('.gate');
    const MAX_TILT = 7;
    wrap.addEventListener('pointermove', (e) => {
      const r = wrap.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width;   // 0..1
      const py = (e.clientY - r.top) / r.height;   // 0..1
      const ry = (px - 0.5) * MAX_TILT * 2;
      const rx = (0.5 - py) * MAX_TILT * 2;
      card.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
    });
    wrap.addEventListener('pointerleave', () => {
      card.style.transform = 'rotateX(0deg) rotateY(0deg)';
    });
  })();

  // ── 科技感动态背景：透视网格地平线 + 悬浮光点视差 ──
  (function () {
    const canvas = $('#bg-canvas');
    const ctx = canvas.getContext('2d');
    let w, h, dpr, dust;
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const MINT = '78,224,193';
    const BLUE = '91,140,255';

    const mouse = { x: 0.5, y: 0.5 }; // 归一化 0..1
    const parallax = { x: 0, y: 0 };
    window.addEventListener('pointermove', (e) => {
      mouse.x = e.clientX / window.innerWidth;
      mouse.y = e.clientY / window.innerHeight;
    });

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth; h = window.innerHeight;
      canvas.width = w * dpr; canvas.height = h * dpr;
      canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const count = Math.round(Math.min(140, Math.max(60, (w * h) / 13000)));
      dust = Array.from({ length: count }, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        z: Math.random(),                       // 0 远 · 1 近
        vy: -(0.08 + Math.random() * 0.22),
        phase: Math.random() * Math.PI * 2,
      }));
    }

    let t = 0;
    const HORIZON_RATIO = 0.4;
    const ROWS = 14;
    const COLS = 15;

    function drawGrid() {
      const horizonY = h * HORIZON_RATIO;
      const px = (mouse.x - 0.5) * 24;   // 视差偏移
      const py = (mouse.y - 0.5) * 14;
      const vpX = w / 2 + px;
      const vpY = horizonY + py;

      // 地平线辉光
      const glowGrad = ctx.createLinearGradient(0, horizonY - 40, 0, horizonY + 6);
      glowGrad.addColorStop(0, 'rgba(78,224,193,0)');
      glowGrad.addColorStop(1, 'rgba(78,224,193,0.16)');
      ctx.fillStyle = glowGrad;
      ctx.fillRect(0, horizonY - 40, w, 46);

      // 横线：由远及近，向下加速运动，制造朝观察者移动的透视感
      for (let i = 0; i < ROWS; i++) {
        const prog = ((i / ROWS) + (t % 1)) % 1;          // 0 远 → 1 近
        const ease = prog * prog;
        const y = vpY + ease * (h - vpY);
        if (y <= vpY || y > h) continue;
        const o = (1 - prog) * 0.5 + 0.05;
        ctx.strokeStyle = `rgba(${MINT},${o * 0.55})`;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
      }

      // 纵线：从灭点向下方左右展开
      const spread = w * 0.9;
      for (let j = -COLS; j <= COLS; j++) {
        const farX = vpX + j * 3;
        const nearX = vpX + (j / COLS) * spread;
        const o = 1 - Math.min(1, Math.abs(j) / COLS) * 0.55;
        ctx.strokeStyle = `rgba(${j % 2 ? BLUE : MINT},${0.14 * o})`;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(farX, vpY); ctx.lineTo(nearX, h); ctx.stroke();
      }

      // 灭点微光
      const vg = ctx.createRadialGradient(vpX, vpY, 0, vpX, vpY, 180);
      vg.addColorStop(0, 'rgba(91,140,255,0.16)');
      vg.addColorStop(1, 'rgba(91,140,255,0)');
      ctx.fillStyle = vg;
      ctx.fillRect(vpX - 180, vpY - 120, 360, 240);
    }

    function drawDust() {
      const px = (mouse.x - 0.5) * 46;
      const py = (mouse.y - 0.5) * 30;
      for (const d of dust) {
        d.y += d.vy * (0.4 + d.z);
        if (d.y < -10) { d.y = h + 10; d.x = Math.random() * w; }
        const shiftX = px * d.z;
        const shiftY = py * d.z;
        const size = 0.5 + d.z * 1.8;
        const twinkle = 0.4 + 0.4 * Math.sin(t * 3 + d.phase);
        ctx.beginPath();
        ctx.arc(d.x + shiftX, d.y + shiftY, size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${d.z > 0.6 ? MINT : BLUE},${(0.2 + d.z * 0.5) * twinkle})`;
        ctx.fill();
      }
    }

    function step() {
      ctx.clearRect(0, 0, w, h);
      drawGrid();
      drawDust();
      t += 0.0028;
      if (!reduceMotion) requestAnimationFrame(step);
    }

    resize();
    window.addEventListener('resize', resize);
    step();
  })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>登录 · 电商工作台</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230a0e17'/><path d='M6 20h7M6 14h13M6 26h4' stroke='%234ee0c1' stroke-width='2.6' stroke-linecap='round'/><circle cx='24' cy='11' r='3' fill='%235b8cff'/></svg>">
<link rel="stylesheet" href="/styles.css">
<style>
  /* 全局样式表把 html/body 锁成 overflow:hidden（内页需要），登录页要放开 */
  html { height: auto; min-height: 100%; }
  body {
    overflow: hidden; position: relative; height: 100vh; min-height: 100vh;
    background:
      radial-gradient(65% 80% at 24% 46%, #146070 0%, #0c4351 26%, #072e3c 45%, #051c28 65%, #030f18 85%, #030710 100%);
  }

  #wave-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
  .vignette {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: radial-gradient(120% 100% at 50% 50%, transparent 45%, #030710b0 100%);
  }

  /* ── 左上角品牌徽标 ── */
  .brand-badge {
    position: fixed; top: 26px; left: 28px; z-index: 3;
    animation: rise 0.5s var(--ease) both;
  }
  .brand-badge img { display: block; height: 34px; width: auto; filter: drop-shadow(0 2px 8px #000a); }

  /* ── 主体：标题 + 卡片，整体偏右悬浮居中 ── */
  .stage {
    position: relative; z-index: 2; min-height: 100vh;
    display: flex; align-items: center; justify-content: flex-end;
    padding: 24px clamp(32px, 15vw, 220px) 24px 28px;
  }
  .stack { width: min(360px, 100%); }

  .hero-h { margin: 0 0 22px; animation: rise 0.55s var(--ease) both; }
  .hero-h h1 { margin: 0; font-family: var(--f-display); line-height: 1.16; }
  .hero-h .l1 { display: block; font-size: clamp(24px, 2.7vw, 32px); font-weight: 700; color: #fbfffe; text-shadow: 0 0 30px #4ee0c130; }
  .hero-h .l2 { display: block; margin-top: 4px; font-size: clamp(15px, 1.5vw, 18px); font-weight: 500; letter-spacing: 1px; color: #9fb0c2; }

  .gate-wrap { perspective: 1000px; animation: rise 0.6s var(--ease) both; }
  .gate {
    background: linear-gradient(165deg, #163444 0%, #0d2836 60%, rgba(11,28,38,0.42) 100%);
    background-color: rgba(16, 40, 52, 0.32);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 16px;
    padding: 22px 24px 20px;
    box-shadow: 0 30px 70px -25px #000c, inset 0 1px 0 rgba(255,255,255,0.1);
    transform: rotateX(0deg) rotateY(0deg);
    transition: transform 0.35s var(--ease), box-shadow 0.35s var(--ease);
    transform-style: preserve-3d; will-change: transform;
  }
  .field { margin-bottom: 15px; }
  .field label { display: block; font-size: 12.5px; color: #cfd8e4; margin-bottom: 7px; }
  .field input {
    width: 100%; background: rgba(255,255,255,0.055); border: 1px solid rgba(255,255,255,0.22); color: #fff;
    padding: 10px 13px; border-radius: 8px; transition: border-color var(--fast), box-shadow var(--fast), background var(--fast);
  }
  .field input::placeholder { color: #8fa0b3; }
  .field input:focus { outline: none; background: rgba(255,255,255,0.08); border-color: var(--mint); box-shadow: 0 0 0 3px var(--mint-dim), 0 0 20px -4px #4ee0c188; }
  #p { font-family: var(--f-mono); letter-spacing: 8px; font-size: 16px; }
  #p::placeholder { letter-spacing: 6px; }

  .gate .solid {
    width: 100%; margin-top: 6px; padding: 12px; position: relative; overflow: hidden;
    border-radius: 999px; cursor: pointer;
    border: 1.5px solid rgba(200,248,255,0.95);
    font-family: var(--f-body); font-size: 14.5px; font-weight: 700; color: #0b2230;
    background: linear-gradient(90deg, #1f93c9 0%, #a9edff 22%, #eafeff 50%, #a9edff 78%, #1f93c9 100%);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.15),
      0 0 22px 2px rgba(80,222,255,0.55),
      0 6px 16px -6px rgba(0,0,0,0.45),
      inset 0 9px 12px -7px rgba(255,255,255,0.9),
      inset 0 -8px 10px -6px rgba(15,110,150,0.4);
    transition: transform 0.24s var(--ease), box-shadow 0.24s var(--ease), filter 0.24s var(--ease);
  }
  .gate .solid:hover {
    transform: translateY(-1px);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.2),
      0 0 30px 4px rgba(80,222,255,0.7),
      0 8px 20px -6px rgba(0,0,0,0.5),
      inset 0 9px 12px -7px rgba(255,255,255,0.95),
      inset 0 -8px 10px -6px rgba(15,110,150,0.4);
  }
  .gate .solid:active { transform: translateY(0); }
  .gate .solid:disabled { cursor: wait; filter: brightness(0.9); }

  .err {
    margin: 12px 0 0; padding: 9px 12px; border-radius: 8px; font-size: 12.5px;
    background: #2a1214cc; color: #ff9a9a; border-left: 3px solid #ff6161;
    animation: shake 0.32s var(--ease);
  }
  @keyframes shake { 25% { transform: translateX(-5px); } 60% { transform: translateX(4px); } 100% { transform: none; } }

  .row-rf { margin-top: 14px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #b7c2d1; }
  .row-rf .remember { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .row-rf .remember input { width: 13px; height: 13px; accent-color: var(--mint); cursor: pointer; }
  .row-rf .forgot { color: #b7c2d1; background: none; border: none; padding: 0; font-size: 12px; cursor: pointer; text-decoration: none; }
  .row-rf .forgot:hover { color: var(--mint); text-decoration: underline; }
  .forgot-note { margin-top: 8px; font-size: 11.5px; color: var(--dimmer); text-align: right; }

  @media (max-width: 760px) {
    body { overflow-y: auto; height: auto; }
    .stage { justify-content: center; padding: 100px 20px 40px; align-items: flex-start; }
    .hero-h .l1, .hero-h .l2 { text-align: center; }
    .stack { width: min(380px, 100%); }
  }

  @media (prefers-reduced-motion: reduce) {
    .gate { transition: none; }
  }
</style>
</head>
<body>
<canvas id="wave-canvas"></canvas>
<div class="vignette"></div>

<div class="brand-badge">
  <img src="/iqair-logo.webp" alt="IQAir">
</div>

<div class="stage">
  <div class="stack">
    <div class="hero-h">
      <h1><span class="l1">IQAir 电商工作台</span><span class="l2">E-Commerce Workbench</span></h1>
    </div>

    <div class="gate-wrap">
      <div class="gate">
        <div class="field">
          <label for="u">用户名</label>
          <input id="u" type="text" autocomplete="username" autofocus spellcheck="false" placeholder="输入用户名">
        </div>
        <div class="field">
          <label for="p">PIN · 6 位数字</label>
          <input id="p" type="password" inputmode="numeric" autocomplete="current-password" maxlength="6" placeholder="······">
        </div>

        <button class="solid" id="go">Sign In</button>
        <div id="err" hidden></div>

        <div class="row-rf">
          <label class="remember"><input type="checkbox" id="remember" checked><span>记住我</span></label>
          <button type="button" class="forgot" id="forgot-btn">忘记密码？</button>
        </div>
        <p class="forgot-note" id="forgot-note" hidden>PIN 忘了找管理员重置，这台设备登录后 30 天内免登录。</p>
      </div>
    </div>
  </div>
</div>

<script>
  const $ = (s) => document.querySelector(s);
  const errBox = $('#err');

  function fail(msg) {
    errBox.hidden = false;
    errBox.className = 'err';
    errBox.textContent = msg;
    errBox.style.animation = 'none';
    void errBox.offsetWidth;
    errBox.style.animation = '';
  }

  const pinBox = $('#p');
  pinBox.addEventListener('input', () => { pinBox.value = pinBox.value.replace(/\D/g, '').slice(0, 6); });

  async function submit() {
    const name = $('#u').value.trim();
    const pin = pinBox.value;
    if (!name) return fail('先填用户名。');
    if (!/^\d{6}$/.test(pin)) return fail('PIN 是 6 位数字。');

    const btn = $('#go');
    btn.disabled = true;
    btn.textContent = '核对中…';
    try {
      const r = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, pin })
      });
      if (r.ok) {
        btn.textContent = '欢迎回来';
        location.replace('/');
        return;
      }
      const j = await r.json().catch(() => ({}));
      fail(j.error || '登录没通过。');
    } catch {
      fail('连不上服务。到服务器上看一眼：systemctl status workbench');
    }
    btn.disabled = false;
    btn.textContent = 'Sign In';
    pinBox.select();
  }

  $('#go').onclick = submit;
  document.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });

  $('#forgot-btn').onclick = () => { $('#forgot-note').hidden = false; };

  // ── 登录卡片 3D 倾斜微交互 ──
  (function () {
    if (!window.matchMedia('(pointer: fine)').matches) return; // 触屏不做倾斜
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const wrap = $('.gate-wrap');
    const card = $('.gate');
    const MAX_TILT = 5;
    wrap.addEventListener('pointermove', (e) => {
      const r = wrap.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width;
      const py = (e.clientY - r.top) / r.height;
      const ry = (px - 0.5) * MAX_TILT * 2;
      const rx = (0.5 - py) * MAX_TILT * 2;
      card.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
    });
    wrap.addEventListener('pointerleave', () => {
      card.style.transform = 'rotateX(0deg) rotateY(0deg)';
    });
  })();

  // ── 全屏背景：光丝编织波纹 + 电路方框装饰 + 粒子 ──
  (function () {
    const canvas = $('#wave-canvas');
    const ctx = canvas.getContext('2d');
    let w, h, dpr, strands, sparks, boxes;
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const MINT = '110,235,220';
    const CYAN = '90,210,235';
    const BLUE = '120,170,255';
    const COLORS = [MINT, CYAN, MINT, BLUE, CYAN, MINT, CYAN];

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth; h = window.innerHeight;
      canvas.width = w * dpr; canvas.height = h * dpr;
      canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      strands = COLORS.map((color, i) => ({
        color,
        baseY: h * (0.14 + (i / COLORS.length) * 0.62),
        amp: h * (0.07 + Math.random() * 0.08),
        amp2: h * (0.03 + Math.random() * 0.035),
        freq: 2.2 + Math.random() * 1.3,
        freq2: 4.5 + Math.random() * 2.5,
        speed: 0.12 + Math.random() * 0.1,
        phase: Math.random() * Math.PI * 2,
        width: 1.3 + Math.random() * 1.8,
      }));

      const count = Math.round(Math.min(140, Math.max(70, (w * h) / 13000)));
      sparks = Array.from({ length: count }, () => ({
        u: Math.random(),               // 沿 x 方向的相对位置 0..1
        strandIdx: Math.floor(Math.random() * strands.length),
        off: (Math.random() - 0.5) * 10,
        z: Math.random(),
        vx: 0.05 + Math.random() * 0.09,
        phase: Math.random() * Math.PI * 2,
        size: 0.8 + Math.random() * 2.2,
      }));

      boxes = Array.from({ length: 5 }, () => ({
        x: w * (0.02 + Math.random() * 0.22),
        y: h * (0.55 + Math.random() * 0.35),
        size: 30 + Math.random() * 70,
        rot: (Math.random() - 0.5) * 0.5,
        alpha: 0.05 + Math.random() * 0.08,
      }));
    }

    // 淡出包络：左 60% 明亮，右侧逐渐减弱（贴近卡片处几乎消失，卡片外沿又微微透出）
    function envelope(xNorm) {
      if (xNorm < 0.58) return 1;
      const t = (xNorm - 0.58) / 0.42;
      return Math.max(0.08, 1 - t * 0.85);
    }

    function strandY(s, x, t) {
      return s.baseY
        + Math.sin(x / (w / s.freq) + t * s.speed + s.phase) * s.amp
        + Math.sin(x / (w / s.freq2) - t * s.speed * 0.7) * s.amp2;
    }

    function drawStrands(t) {
      for (const s of strands) {
        ctx.beginPath();
        for (let x = 0; x <= w; x += 7) {
          const y = strandY(s, x, t);
          if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        const grad = ctx.createLinearGradient(0, 0, w, 0);
        const a = 0.8;
        grad.addColorStop(0, `rgba(${s.color},${a * envelope(0)})`);
        grad.addColorStop(0.58, `rgba(${s.color},${a * envelope(0.58)})`);
        grad.addColorStop(1, `rgba(${s.color},${a * envelope(1)})`);
        ctx.strokeStyle = grad;
        ctx.lineWidth = s.width;
        ctx.shadowColor = `rgba(${s.color},1)`;
        ctx.shadowBlur = 16;
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
    }

    function drawBoxes() {
      for (const b of boxes) {
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(b.rot);
        ctx.strokeStyle = `rgba(150,210,220,${b.alpha})`;
        ctx.lineWidth = 1;
        ctx.strokeRect(-b.size / 2, -b.size / 2, b.size, b.size);
        ctx.restore();
      }
    }

    function drawSparks(t) {
      for (const p of sparks) {
        p.u += p.vx * 0.0016 * (0.4 + p.z);
        if (p.u > 1) p.u -= 1;
        const x = p.u * w;
        const s = strands[p.strandIdx];
        const y = strandY(s, x, t) + p.off;
        const env = envelope(p.u);
        const twinkle = 0.5 + 0.5 * Math.sin(t * 2.6 + p.phase);
        const alpha = (0.3 + p.z * 0.5) * twinkle * env;
        if (alpha <= 0.02) continue;
        ctx.beginPath();
        ctx.arc(x, y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.z > 0.6 ? MINT : CYAN},${alpha})`;
        ctx.shadowColor = `rgba(${MINT},0.9)`;
        ctx.shadowBlur = 6;
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    }

    let t = 0;
    function step() {
      ctx.clearRect(0, 0, w, h);
      drawBoxes();
      drawStrands(t);
      drawSparks(t);
      t += 0.012;
      if (!reduceMotion) requestAnimationFrame(step);
    }

    resize();
    window.addEventListener('resize', resize);
    if (reduceMotion) { drawBoxes(); drawStrands(0); drawSparks(0); } else { step(); }
  })();
</script>
</body>
</html>
